<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: #ff6600;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #000000;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        section {
            padding: 20px;
            margin: 10px auto;
            max-width: 1000px;
            border-bottom: 2px solid #ff6600;
        }
        h2 {
            color: #0000ff;
        }
        .funciones-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .funciones-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .funcion-item-link {
            text-decoration: none;
            color: inherit;
        }
        .funcion-item {
            width: 400px; /* Ancho fijo */
            height: 200px; /* Alto fijo */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .funcion-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .funcion-item img {
            margin: 10px 0;
            max-width: 300px;
            height: auto;
        }
        footer {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 10px;
        }
        .button-fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #004080;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background-color 0.3s;
            z-index: 1000;
        }
        .button-fixed:hover {
            background: #ff6600;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>Herramientas y Plataformas</h1>
    </header>
    <nav>
        <a href="#herramientas"></a>
        <a href="#contacto"></a>
    </nav>
    <section id="herramientas">
        <h2>Herramientas Utilizadas 🧰</h2>
        <div class="funciones-grid">
            <a href="bancard.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>Bancard</h3>
                    <img src="imagenes/imagen32.jpg" alt="Pantalla Bancard" style="width: 300px; height: auto;">
                </div>
            </a>
            <a href="saccom.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>SAC.COM</h3>
                    <img src="imagenes/imagen0.jpg" alt="Pantalla SAC.COM">
                </div>
            </a>
            <a href="BPM.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>BPM: Business Process Manager</h3>
                    <img src="imagenes/imagen33.jpg" alt="Pantalla BPM">
                </div>
            </a>
            <a href="ptelectronica.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>PT Electronica</h3>
                    <img src="imagenes/imagen34.jpg" alt="Pantalla PT Electronica">
                </div>
            </a>
            <a href="snpi.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>SNPI: Sistema Nacional de Pagos</h3>
                    <img src="imagenes/imagen35.jpg" alt="Pantalla SNPy">
                </div>
            </a>
            <a href="extranet.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>Extranet</h3>
                    <img src="imagenes/imagen36.jpg" alt="Pantalla Extranet">
                </div>
            </a>
            <a href="admin24hs.html" class="funcion-item-link">
                <div class="funcion-item">
                    <h3>ADMIN 24hs</h3>
                    <img src="imagenes/imagen37.jpg" alt="Pantalla ADMIN 24hs">
                </div>
            </a>
        </div>
    </section>
    <footer>
        <p>&copy; 2025 ArrowX - Todos los derechos reservados.</p>
    </footer>
    <a href="iXpert.html" class="button-fixed">⬅ Volver a la Portada</a>
</body>
</html>
