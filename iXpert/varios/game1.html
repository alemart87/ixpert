<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trivia Bancaria WOW</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #004080, #ff6600, #333);
      background-size: 600% 600%;
      animation: bgAnimation 18s ease infinite;
      overflow: hidden;
      color: #333;
    }

    @keyframes bgAnimation {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .game-container {
      width: 95%;
      max-width: 800px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      padding: 25px;
      text-align: center;
      position: relative;
      animation: zoomIn 0.8s ease;
      z-index: 2;
    }

    @keyframes zoomIn {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    h1 {
      margin-bottom: 15px;
      font-size: 26px;
      color: #004080;
    }

    .question-card {
      margin: 20px 0;
      font-size: 20px;
      font-weight: bold;
      min-height: 80px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .option {
      background: #ff6600;
      color: #fff;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }
    .option:hover { transform: scale(1.07); background: #cc5200; }
    .correct { background: #28a745 !important; }
    .incorrect { background: #dc3545 !important; }

    .score {
      margin-top: 15px;
      font-size: 16px;
    }

    .progress-bar {
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
      margin: 15px 0;
    }
    .progress {
      height: 100%;
      width: 0;
      background: #004080;
      transition: width 0.5s ease;
    }

    .timer {
      margin: 10px auto;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 6px solid #004080;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #004080;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.1);}
      100% {transform: scale(1);}
    }

    .start-screen, .end-screen {
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .btn {
      background: #004080;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .btn:hover { background: #002d59; transform: scale(1.05); }

    canvas#confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .home-button {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 46px;
      height: 46px;
      background: #004080;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.3s;
      z-index: 3;
    }
    .home-button:hover {
      background: #002d59;
      transform: scale(1.15);
    }
    .home-button svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }
  </style>
</head>

  <canvas id="confetti"></canvas>

      <p id="finalMessage"></p>

    let shuffledQuestions = [];
    let score = 0;
    let questionIndex = 0;
    let timerInterval;
    let streak = 0;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
      score = 0;
      questionIndex = 0;
      streak = 0;
      shuffledQuestions = shuffle([...preguntas]).slice(0, 10); // solo 10 preguntas
      document.getElementById("start").style.display = "none";
      document.getElementById("end").style.display = "none";
      document.getElementById("game").style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      if (questionIndex >= shuffledQuestions.length) {
        endGame();
        return;
      }

      const q = shuffledQuestions[questionIndex];
      document.getElementById("question").innerText = q.pregunta;
      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";
      const shuffledOptions = shuffle([...q.opciones]);

      shuffledOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt === q.correcta);
        optionsDiv.appendChild(btn);
      });

      document.getElementById("score").innerText = `Puntos: ${score}`;
      document.getElementById("progress").style.width = `${(questionIndex / shuffledQuestions.length) * 100}%`;
      document.getElementById("progressText").innerText = `Pregunta ${questionIndex + 1} de ${shuffledQuestions.length}`;

      startTimer(20);
    }

    function checkAnswer(btn, correct) {
      clearInterval(timerInterval);
      if (correct) {
        btn.classList.add("correct");
        score += 10;
        streak++;
        if (streak % 3 === 0) score += 5; // bonus
        launchConfetti(150);
      } else {
        btn.classList.add("incorrect");
        streak = 0;
      }

      setTimeout(() => {
        questionIndex++;
        showQuestion();
      }, 1000);
    }

    function startTimer(seconds) {
      let time = seconds;
      document.getElementById("timer").innerText = time;
      timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;
        if (time <= 0) {
          clearInterval(timerInterval);
          questionIndex++;
          showQuestion();
        }
      }, 1000);
    }

    function endGame() {
      document.getElementById("game").style.display = "none";
      document.getElementById("end").style.display = "block";

      const totalPosible = shuffledQuestions.length * 10;
      document.getElementById("finalScore").innerText = `Tu puntuación final es: ${score} puntos de ${totalPosible}.`;

      let mensaje = "";
      const porcentaje = (score / totalPosible) * 100;
      if (porcentaje >= 80) mensaje = "¡Crack total 👏!";
      else if (porcentaje >= 50) mensaje = "Bien hecho 💪";
      else mensaje = "Podés mejorar 😉";
      document.getElementById("finalMessage").innerText = mensaje;

      // Guardar récord
      const best = localStorage.getItem("bestScore") || 0;
      if(score > best) localStorage.setItem("bestScore", score);
      document.getElementById("bestScore").innerText = `Tu récord actual es: ${localStorage.getItem("bestScore")} puntos`;

      document.getElementById("progress").style.width = "100%";
      launchConfetti(600);
    }

    const confettiCanvas = document.getElementById("confetti");
    const ctx = confettiCanvas.getContext("2d");
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
    let confettiPieces = [];

    function launchConfetti(count) {
      for (let i = 0; i < count; i++) {
        confettiPieces.push({
          x: Math.random() * confettiCanvas.width,
          y: Math.random() * confettiCanvas.height - confettiCanvas.height,
          size: Math.random() * 8 + 4,
          color: `hsl(${Math.random() * 360}, 100%, 50%)`,
          speed: Math.random() * 3 + 2,
          angle: Math.random() * Math.PI * 2
        });
      }
    }

    function updateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiPieces.forEach((p, i) => {
        p.y += p.speed;
        p.x += Math.sin(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        if (p.y > confettiCanvas.height) confettiPieces.splice(i, 1);
      });
      requestAnimationFrame(updateConfetti);
    }
    updateConfetti();

    window.onresize = () => {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    };
  </script>
